<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAMES MASTER</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
</head>
<body>
  <div id="mobileBlock">
    <div id="mobileBlock-bg"></div>
    <div id="mobileBlock-content">
      <p class="mb-title">GAMES MASTER</p>
      <p class="mb-sub">This game requires a keyboard&nbsp;&amp;&nbsp;mouse.</p>
      <p class="mb-sub">Visit on a computer to play.</p>
    </div>
  </div>
  <canvas id="gameCanvas" width="320" height="200"></canvas>
  <script>
    // Hide canvas and show block screen on touch-primary devices
    if (window.matchMedia('(pointer: coarse)').matches) {
      document.getElementById('mobileBlock').style.display = 'flex';
      document.getElementById('gameCanvas').style.display = 'none';
    }
  </script>
  <script src="constants.js"></script>
  <script src="map.js"></script>
  <script src="map_r3.js"></script>
  <script src="overworld.js"></script>
  <script src="entities.js"></script>
  <script src="textures.js"></script>
  <script src="decals.js"></script>
  <script src="raycaster.js"></script>
  <script src="sprites.js"></script>
  <script src="ai.js"></script>
  <script src="audio.js"></script>
  <script src="renderer.js"></script>
  <script src="game.js"></script>
</body>
</html>
